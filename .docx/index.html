<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Tang — Network & Cloud Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Token System ── */
    :root[data-theme="dark"] {
      --bg:         #0a0a0a;
      --bg-card:    #111111;
      --bg-hover:   #1a1a1a;
      --border:     #222222;
      --border-hi:  #444444;
      --text-pri:   #f0f0f0;
      --text-sec:   #888888;
      --text-dim:   #444444;
      --accent:     #ffffff;
      --tag-bg:     #1e1e1e;
      --tag-text:   #aaaaaa;
      --badge-bg:   #161616;
    }
    :root[data-theme="light"] {
      --bg:         #f8f8f8;
      --bg-card:    #ffffff;
      --bg-hover:   #f0f0f0;
      --border:     #e0e0e0;
      --border-hi:  #aaaaaa;
      --text-pri:   #111111;
      --text-sec:   #555555;
      --text-dim:   #bbbbbb;
      --accent:     #000000;
      --tag-bg:     #eeeeee;
      --tag-text:   #555555;
      --badge-bg:   #f4f4f4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-pri);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 60px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.25s, border-color 0.25s;
    }
    .nav-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-pri);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      list-style: none;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--text-sec);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.18s;
    }
    .nav-links a:hover { color: var(--text-pri); }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border-hi);
      color: var(--text-sec);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      transition: all 0.18s;
    }
    .theme-toggle:hover { color: var(--text-pri); border-color: var(--text-pri); }

    /* ── Layout ── */
    main { padding-top: 60px; }

    section {
      padding: 90px 5vw;
      border-bottom: 1px solid var(--border);
      max-width: 1100px;
      margin: 0 auto;
    }
    section:last-of-type { border-bottom: none; }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }
    h2 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ── Hero ── */
    #hero {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }
    .hero-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-sec);
      letter-spacing: 0.12em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--text-dim);
    }
    .hero-desc {
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--text-sec);
      max-width: 560px;
      margin-top: 20px;
      line-height: 1.65;
    }
    .hero-cta {
      margin-top: 44px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 11px 28px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: 1px solid var(--accent);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      color: var(--text-pri);
      border: 1px solid var(--border-hi);
    }
    .btn-ghost:hover { border-color: var(--text-pri); }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--text-pri);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }
    .about-text p {
      color: var(--text-sec);
      margin-bottom: 16px;
      line-height: 1.75;
    }
    .about-text p:last-child { margin-bottom: 0; }
    .skill-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .chip {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .stat-box {
      background: var(--bg-card);
      padding: 28px 24px;
    }
    .stat-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 32px;
      font-weight: 600;
      color: var(--text-pri);
      line-height:
